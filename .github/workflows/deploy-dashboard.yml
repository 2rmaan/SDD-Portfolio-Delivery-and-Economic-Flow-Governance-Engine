name: Deploy Delivery Dashboard

on:
  push:
    branches: [main]
    paths:
      - "sdd/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: sdd
        run: pip install -e .

      - name: Generate dashboard
        working-directory: sdd
        run: |
          python3 -m delivery_engine.cli \
            --flat-csv tests/fixtures/strategic_delivery_data.csv \
            --output-dir _site/
          mv _site/dashboard.html _site/index.html

      - name: Deploy to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          # Create or reset gh-pages branch
          git fetch origin gh-pages 2>/dev/null || true
          git checkout --orphan gh-pages-new
          git rm -rf . --quiet

          cp sdd/_site/index.html index.html

          git add index.html
          git commit -m "Deploy dashboard from ${{ github.sha }}"
          git push origin gh-pages-new:gh-pages --force
