name: Deploy Delivery Dashboard

on:
  push:
    branches: [main]
    paths:
      - "sdd/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: sdd
        run: pip install -e .

      - name: Generate dashboard
        working-directory: sdd
        run: |
          python3 -m delivery_engine.cli \
            --flat-csv tests/fixtures/strategic_delivery_data.csv \
            --output-dir _site/

      - name: Commit dashboard to docs/
        run: |
          mkdir -p docs
          cp sdd/_site/dashboard.html docs/index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update dashboard [skip ci]"
          git push origin main
